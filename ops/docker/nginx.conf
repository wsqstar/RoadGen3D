server {
  listen 80;
  server_name _;
  client_max_body_size 100m;

  # The shared-server image exposes only the authenticated multi-user API.
  # The legacy /api/* research endpoints use local filesystem semantics and
  # deliberately remain unavailable from this public reverse proxy.
  location ^~ /api/v1/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 1800s;
  }

  # Keep a minimal probe available to an external load balancer. It does not
  # disclose tenant data or server paths.
  location = /api/health {
    proxy_pass http://api:8000/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ^~ /api/ {
    return 404;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
