[unix_http_server]
file=/workspace/roadgen3d-data/run/supervisor.sock
chmod=0700

[supervisord]
logfile=/workspace/roadgen3d-data/logs/supervisord.log
pidfile=/workspace/roadgen3d-data/run/supervisord.pid
childlogdir=/workspace/roadgen3d-data/logs
nodaemon=false
minfds=65536

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///workspace/roadgen3d-data/run/supervisor.sock

[program:roadgen3d-api]
command=/bin/bash -lc 'set -a; source /workspace/roadgen3d-data/roadgen3d.env; set +a; exec /workspace/RoadGen3D/.venv/bin/python -m uvicorn web.api.main:app --host 0.0.0.0 --port 8010 --workers 1'
directory=/workspace/RoadGen3D
autostart=true
autorestart=true
startsecs=5
stopasgroup=true
killasgroup=true
stdout_logfile=/workspace/roadgen3d-data/logs/api.log
stderr_logfile=/workspace/roadgen3d-data/logs/api-error.log
environment=HOME="/root"

[program:roadgen3d-worker]
command=/bin/bash -lc 'set -a; source /workspace/roadgen3d-data/roadgen3d.env; set +a; exec /workspace/RoadGen3D/.venv/bin/python -m roadgen3d.teaching.worker'
process_name=%(program_name)s_%(process_num)02d
numprocs=25
directory=/workspace/RoadGen3D
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=120
stopasgroup=true
killasgroup=true
stdout_logfile=/workspace/roadgen3d-data/logs/worker-%(process_num)02d.log
stderr_logfile=/workspace/roadgen3d-data/logs/worker-%(process_num)02d-error.log
environment=HOME="/root"

[program:roadgen3d-nginx]
command=/usr/sbin/nginx -c /workspace/RoadGen3D/ops/container/teaching-nginx.conf -g 'daemon off;'
directory=/workspace/RoadGen3D
autostart=true
autorestart=true
startsecs=3
stopasgroup=true
killasgroup=true
stdout_logfile=/workspace/roadgen3d-data/logs/nginx-supervisor.log
stderr_logfile=/workspace/roadgen3d-data/logs/nginx-supervisor-error.log
