<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>/System/Library/Fonts</dir>
  <dir>/System/Library/Fonts/Supplemental</dir>
  <dir>/Library/Fonts</dir>
  <dir>/System/Library/AssetsV2/com_apple_MobileAsset_Font8</dir>
  <cachedir>/private/tmp/roadgen3d-font-cache</cachedir>
  <match target="pattern">
    <test name="family" qual="any"><string>Heiti SC</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>Hiragino Sans GB</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh</string></test>
    <edit name="family" mode="append"><string>Hiragino Sans GB</string></edit>
    <edit name="family" mode="append"><string>Songti SC</string></edit>
  </match>
</fontconfig>
