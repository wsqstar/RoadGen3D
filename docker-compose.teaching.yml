name: roadgen3d-teaching

x-roadgen-env: &roadgen-env
  ROADGEN_DATABASE_URL: postgresql+psycopg://roadgen3d:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/roadgen3d
  ROADGEN_REDIS_URL: redis://redis:6379/0
  ROADGEN_JOB_MODE: rq
  ROADGEN_OBJECT_STORE: s3
  ROADGEN_S3_ENDPOINT: http://minio:9000
  ROADGEN_S3_BUCKET: roadgen3d
  ROADGEN_S3_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
  ROADGEN_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
  ROADGEN_BOOTSTRAP_TOKEN: ${ROADGEN_BOOTSTRAP_TOKEN:?set ROADGEN_BOOTSTRAP_TOKEN}
  ROADGEN_CORS_ORIGINS: ${ROADGEN_CORS_ORIGINS:-http://localhost:8080}
  ROADGEN_MAX_ACTIVE_JOBS_PER_USER: 3
  ROADGEN_JOB_TIMEOUT_SECONDS: 1800
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}

services:
  frontend:
    build:
      context: .
      dockerfile: ops/docker/viewer.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ops/docker/api.Dockerfile
    environment: *roadgen-env
    volumes:
      - roadgen_runtime:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ops/docker/api.Dockerfile
    command: ["sh", "-c", "alembic upgrade head && python -m roadgen3d.teaching.worker"]
    environment: *roadgen-env
    volumes:
      - roadgen_runtime:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roadgen3d
      POSTGRES_USER: roadgen3d
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadgen3d -d roadgen3d"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  roadgen_runtime:
